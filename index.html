<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="manifest.json"/>
<title>Net Worth</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--bg4:#1e1e27;--border:#2a2a38;--border2:#333345;--text:#f0f0f5;--text2:#9090a8;--text3:#5a5a72;--green:#00e5a0;--green2:#00b880;--red:#ff4d6a;--red2:#cc2d47;--yellow:#f5c542;--blue:#4d90ff;--purple:#9b7ec8;--orange:#fb923c;--mono:'DM Mono',monospace;--sans:'Syne',sans-serif;--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px}
.hide{display:none!important}

/* AUTH */
#auth{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.auth-logo{font-family:var(--sans);font-size:32px;font-weight:800;letter-spacing:-2px;background:linear-gradient(135deg,var(--green),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.auth-sub{color:var(--text3);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:36px}
.auth-tabs{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px;width:100%;max-width:320px}
.auth-tab{flex:1;padding:10px;background:none;border:none;color:var(--text2);font-family:var(--mono);font-size:13px;cursor:pointer}
.auth-tab.active{background:var(--bg4);color:var(--text)}
.auth-form{width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px}
.auth-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;padding:12px 14px;outline:none}
.auth-input:focus{border-color:var(--purple)}
.auth-btn{width:100%;background:linear-gradient(135deg,var(--green2),var(--purple));border:none;border-radius:8px;color:#000;font-family:var(--sans);font-size:14px;font-weight:700;padding:13px;cursor:pointer;margin-top:4px}
.auth-msg{font-size:12px;min-height:18px;text-align:center;margin-top:4px;color:var(--text3)}
.auth-msg.err{color:var(--red)}
.auth-msg.ok{color:var(--green)}
.auth-link{color:var(--text3);font-size:12px;text-align:center;cursor:pointer;margin-top:8px}

/* APP */
#app{display:flex;flex-direction:column;height:100%;overflow:hidden}

/* HEADER */
.app-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-title{font-family:var(--sans);font-size:16px;font-weight:800;letter-spacing:2px;color:var(--green)}
.header-right{display:flex;align-items:center;gap:8px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.sync-dot.busy{background:var(--yellow);animation:pulse 1s infinite}
.sync-dot.err{background:var(--red)}
.icon-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:6px;border-radius:6px;font-size:15px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* NW BANNER */
.nw-banner{background:var(--bg3);border-bottom:1px solid var(--border);padding:14px 16px;flex-shrink:0}
.nw-row{display:flex;justify-content:space-between;align-items:flex-start}
.nw-main{text-align:left}
.nw-label{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.nw-val{font-family:var(--sans);font-size:30px;font-weight:800;letter-spacing:-1px}
.nw-val.pos{color:var(--green)}
.nw-val.neg{color:var(--red)}
.nw-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.nw-pill{font-size:11px;padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px}
.pill-assets{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.2)}
.pill-debts{background:rgba(255,77,106,.1);color:var(--red);border:1px solid rgba(255,77,106,.2)}
.pill-invest{background:rgba(77,144,255,.1);color:var(--blue);border:1px solid rgba(77,144,255,.2)}

/* TABS */
.nav-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex-shrink:0;padding:10px 14px;background:none;border:none;color:var(--text3);font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.nav-tab.active{color:var(--green);border-bottom-color:var(--green)}

/* CONTENT */
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px}
#content::-webkit-scrollbar{width:3px}
#content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* FAB */
.fab{position:fixed;bottom:calc(20px + var(--safe-bottom));right:20px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--green2),var(--purple));border:none;color:#000;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,229,160,.3);z-index:40}

/* SECTION */
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 6px}
.section-title{font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2)}
.section-total{font-family:var(--mono);font-size:13px}
.section-total.pos{color:var(--green)}
.section-total.neg{color:var(--red)}
.section-total.blue{color:var(--blue)}
.section-total.yellow{color:var(--yellow)}

/* CARDS */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;margin:0 12px 8px;overflow:hidden}
.card-body{padding:14px 16px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.card-name{font-size:14px;font-weight:500;color:var(--text);flex:1}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;flex-shrink:0;margin-left:8px}
.badge-green{background:rgba(0,229,160,.12);color:var(--green);border:1px solid rgba(0,229,160,.25)}
.badge-red{background:rgba(255,77,106,.12);color:var(--red);border:1px solid rgba(255,77,106,.25)}
.badge-blue{background:rgba(77,144,255,.12);color:var(--blue);border:1px solid rgba(77,144,255,.25)}
.badge-yellow{background:rgba(245,197,66,.12);color:var(--yellow);border:1px solid rgba(245,197,66,.25)}
.badge-purple{background:rgba(155,126,200,.12);color:var(--purple);border:1px solid rgba(155,126,200,.25)}
.badge-orange{background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.25)}
.card-amount{font-family:var(--mono);font-size:22px;font-weight:500;margin-bottom:4px}
.card-amount.pos{color:var(--green)}
.card-amount.neg{color:var(--red)}
.card-amount.blue{color:var(--blue)}
.card-amount.yellow{color:var(--yellow)}
.card-meta{font-size:11px;color:var(--text3);line-height:1.6}
.card-meta span{color:var(--text2)}

/* PROGRESS BAR */
.prog-bar{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin:8px 0 4px}
.prog-fill{height:100%;border-radius:3px;transition:width .4s ease}
.prog-green{background:linear-gradient(90deg,var(--green2),var(--green))}
.prog-red{background:var(--red)}
.prog-blue{background:var(--blue)}
.prog-yellow{background:var(--yellow)}

/* CARD ACTIONS */
.card-actions{display:flex;border-top:1px solid var(--border)}
.card-btn{flex:1;background:none;border:none;color:var(--text3);padding:9px 4px;font-size:11px;cursor:pointer;font-family:var(--mono);letter-spacing:.5px}
.card-btn:hover{background:var(--bg4);color:var(--text)}
.card-btn.danger:hover{color:var(--red)}
.card-btn.accent:hover{color:var(--green)}

/* SIMULATOR */
.sim-box{background:var(--bg4);border:1px solid var(--border2);border-radius:10px;margin:0 16px 12px;padding:14px}
.sim-title{font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.sim-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sim-label{font-size:12px;color:var(--text2);flex:1}
.sim-input{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:13px;padding:6px 10px;width:110px;outline:none;text-align:right}
.sim-input:focus{border-color:var(--purple)}
.sim-results{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.sim-result{background:var(--bg3);border-radius:8px;padding:10px 12px;border:1px solid var(--border)}
.sim-result-label{font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.sim-result-val{font-family:var(--mono);font-size:14px;font-weight:500}
.sim-result-diff{font-size:11px;margin-top:2px}
.diff-good{color:var(--green)}
.diff-bad{color:var(--red)}

/* INTEREST CALC */
.int-box{background:var(--bg4);border:1px solid rgba(0,229,160,.15);border-radius:10px;margin:0 16px 12px;padding:14px}
.int-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.int-item{background:var(--bg3);border-radius:8px;padding:10px;border:1px solid var(--border)}
.int-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.int-val{font-family:var(--mono);font-size:14px;color:var(--green)}

/* GAIN/LOSS */
.gain{color:var(--green)}
.loss{color:var(--red)}

/* EMPTY */
.empty{text-align:center;padding:40px 24px;color:var(--text3);font-size:12px;letter-spacing:1px}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.4}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px 18px 0 0;padding:20px 20px 32px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:var(--sans);font-size:17px;font-weight:700;margin-bottom:18px;color:var(--text)}
.form-row{margin-bottom:12px}
.form-label{font-size:11px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.form-input{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;padding:11px 14px;outline:none}
.form-input:focus{border-color:var(--purple)}
.form-select{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;padding:11px 14px;outline:none;appearance:none;cursor:pointer}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.form-hint{font-size:11px;color:var(--text3);margin-top:4px}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.btn-cancel{background:var(--bg4);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:12px;font-family:var(--mono);font-size:13px;cursor:pointer}
.btn-save{background:linear-gradient(135deg,var(--green2),var(--purple));border:none;color:#000;border-radius:8px;padding:12px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer}
.btn-delete{background:var(--bg4);border:1px solid var(--red2);color:var(--red);border-radius:8px;padding:12px;font-family:var(--mono);font-size:13px;cursor:pointer;grid-column:1/-1}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);color:var(--text);font-size:13px;padding:10px 18px;border-radius:20px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.toast.ok{border-color:rgba(0,229,160,.4);color:var(--green)}
.toast.err{border-color:rgba(255,77,106,.4);color:var(--red)}

/* HISTORY */
.hist-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;margin:0 12px 8px;overflow:hidden}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border)}
.hist-row:last-child{border-bottom:none}
.hist-date{font-size:12px;color:var(--text2)}
.hist-val{font-family:var(--mono);font-size:14px;font-weight:500}
</style>
</head>

// ─── DATA ────────────────────────────────────────────────────

// Recovered data pre-loaded
const SEED = {"debts":[{"id":"d1","name":"SoFi Student Loan","balance":22500,"originalBalance":22500,"rate":8.15,"payment":25,"type":"student_loan","dueDay":19},{"id":"mmd10wlr394f","name":"Discover Credit Card","balance":4000,"originalBalance":4000,"rate":21.49,"payment":100,"type":"credit_card","dueDay":13},{"id":"mmd12wxhdo9l","name":"Avant Loans","balance":22898.77,"originalBalance":22898.77,"rate":30.4,"payment":689.51,"type":"personal","dueDay":13},{"id":"mmd15nv7j6yb","name":"Klarna","balance":138.1,"originalBalance":138.1,"rate":0,"payment":13.81,"type":"other","dueDay":28}],"savings":[{"id":"sav1","name":"Capital One Checking","balance":321.34,"apy":0,"type":"checking","last4":"0171"},{"id":"sav2","name":"Capital One Savings","balance":520,"apy":0,"type":"savings","last4":"2413"},{"id":"sav3","name":"Discover Savings","balance":10025.37,"apy":4.25,"type":"hysa","last4":"3605"},{"id":"sav4","name":"WellsFargo Savings","balance":264.51,"apy":0,"type":"savings","last4":"9234"},{"id":"sav5","name":"SoFi Checking","balance":44.94,"apy":0,"type":"checking","last4":"0285"},{"id":"sav6","name":"SoFi Savings","balance":185.02,"apy":4.5,"type":"hysa","last4":"5572"},{"id":"sav7","name":"Cash","balance":530,"apy":0,"type":"cash","last4":""}],"investments":[],"goals":[{"id":"g1","name":"Emergency Fund","target":4000,"current":120,"monthly":400,"date":"2026-12-31"},{"id":"g3","name":"New MacBook","target":2500,"current":0,"monthly":50,"date":""},{"id":"mmd3g6ng5n48","name":"Shipping to Family","target":1800,"current":400,"monthly":0,"date":"2026-10-31"},{"id":"mmd3hh7fr1j9","name":"Car","target":15000,"current":0,"monthly":0,"date":"2026-12-31"},{"id":"mme9k3e2af95","name":"REF 2026 Tuition","target":400,"current":0,"monthly":0,"date":"2026-08-31"},{"id":"mme9l6ebl7j7","name":"Mish's Tuition","target":700,"current":0,"monthly":0,"date":"2026-08-31"}],"history":[{"date":"2026-03-05","value":-41645.69}]};

// ─── UTILS ───────────────────────────────────────────────────
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function fmt(n, showSign) {
  const num = parseFloat(n)||0;
  const abs = Math.abs(num);
  const str = abs.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const sign = num < 0 ? '-' : (showSign && num > 0 ? '+' : '');
  return sign+'$'+str;
}

// Parse YYYY-MM-DD as LOCAL time (not UTC) — fixes the off-by-one date bug
function parseLocal(s) {
  if (!s) return null;
  const p = s.split('-');
  return p.length===3 ? new Date(+p[0], +p[1]-1, +p[2]) : new Date(s);
}

function fmtDate(s) {
  if (!s) return '';
  return parseLocal(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function todayStr() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// ─── DEBT MATH ───────────────────────────────────────────────
function calcDebt(balance, payment, annualRate) {
  if (payment <= 0) return {months: Infinity, totalPaid: Infinity, totalInterest: Infinity};
  if (annualRate === 0) {
    const months = Math.ceil(balance / payment);
    return {months, totalPaid: balance, totalInterest: 0};
  }
  const r = annualRate / 100 / 12;
  let bal = balance, months = 0, totalPaid = 0;
  while (bal > 0.01 && months < 1200) {
    const interest = bal * r;
    const principal = Math.min(payment - interest, bal);
    if (principal <= 0) return {months: Infinity, totalPaid: Infinity, totalInterest: Infinity};
    bal -= principal;
    totalPaid += payment;
    months++;
  }
  if (months >= 1200) return {months: Infinity, totalPaid: Infinity, totalInterest: Infinity};
  const totalInterest = totalPaid - balance;
  return {months, totalPaid, totalInterest};
}

function payoffDateStr(months) {
  if (!isFinite(months)) return 'Never (payment too low)';
  const d = new Date();
  d.setMonth(d.getMonth() + months);
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return mo + ' ' + d.getFullYear();
}

// ─── SAVINGS MATH ────────────────────────────────────────────
function calcSavings(balance, apy, years) {
  // Compound interest: A = P(1 + r/n)^(nt), n=12 (monthly)
  const r = (apy||0) / 100;
  const n = 12;
  const A = balance * Math.pow(1 + r/n, n*years);
  return {total: A, interest: A - balance};
}

// ─── NET WORTH ───────────────────────────────────────────────
function calcNW() {
  const savingsTotal = D.savings.reduce((s,a) => s+(parseFloat(a.balance)||0), 0);
  const investTotal = D.investments.reduce((s,i) => s+(parseFloat(i.currentValue)||0), 0);
  const assets = savingsTotal + investTotal;
  const liabilities = D.debts.reduce((s,d) => s+(parseFloat(d.balance)||0), 0);
  return {assets, liabilities, invested: investTotal, net: assets - liabilities};
}

async function pushCloud() {
  if (!ME) return;
  setSyncUI('busy');
  clearTimeout(saveT);
  saveT = setTimeout(async()=>{
    const {error} = await SB.from('user_data').upsert(
      {id:ME.id, networth_data:JSON.parse(JSON.stringify(D)), updated_at:new Date().toISOString()},
      {onConflict:'id'}
    );
    setSyncUI(error?'err':'ok');
    if (error) toast('Sync failed','err');
  }, 1000);
}
async function pullCloud() {
  if (!ME) return;
  setSyncUI('busy');
  const {data,error} = await SB.from('user_data').select('networth_data').eq('id',ME.id).single();
  if (data && data.networth_data && (data.networth_data.debts||data.networth_data.savings)) {
    D = data.networth_data;
    if(!D.debts)D.debts=[];
    if(!D.savings)D.savings=[];
    if(!D.investments)D.investments=[];
    if(!D.goals)D.goals=[];
    if(!D.history)D.history=[];
    saveLocal();
  } else {
    pushCloud();
  }
  setSyncUI('ok');
  renderAll();
}

function runSim(id, bal, rate, basePay){
  const newPay=parseFloat(document.getElementById('sim-pay')?.value)||0;
  if(newPay<=0)return;
  const base=calcDebt(bal,basePay,rate);
  const sim=calcDebt(bal,newPay,rate);
  const moSaved=isFinite(base.months)&&isFinite(sim.months)?base.months-sim.months:null;
  const intSaved=isFinite(base.totalInterest)&&isFinite(sim.totalInterest)?base.totalInterest-sim.totalInterest:null;
  const extra=newPay-basePay;
  const el=document.getElementById('sim-results');
  if(!el)return;
  el.innerHTML=`<div class="sim-results">
    <div class="sim-result">
      <div class="sim-result-label">Payoff Date</div>
      <div class="sim-result-val">${isFinite(sim.months)?payoffDateStr(sim.months):'Never'}</div>
      ${moSaved!==null&&moSaved>0?`<div class="sim-result-diff diff-good">↑ ${moSaved} months sooner</div>`:''}
    </div>
    <div class="sim-result">
      <div class="sim-result-label">Months Left</div>
      <div class="sim-result-val">${isFinite(sim.months)?sim.months:'∞'}</div>
      ${moSaved!==null&&moSaved>0?`<div class="sim-result-diff diff-good">Save ${moSaved} months</div>`:''}
    </div>
    <div class="sim-result">
      <div class="sim-result-label">Total Interest</div>
      <div class="sim-result-val">${isFinite(sim.totalInterest)?fmt(sim.totalInterest):'∞'}</div>
      ${intSaved!==null&&intSaved>0?`<div class="sim-result-diff diff-good">Save ${fmt(intSaved)}</div>`:''}
    </div>
    <div class="sim-result">
      <div class="sim-result-label">Extra/Month</div>
      <div class="sim-result-val ${extra>0?'diff-good':extra<0?'diff-bad':''}">${extra>=0?'+':''}${fmt(extra)}</div>
      ${intSaved!==null&&extra>0?`<div class="sim-result-diff diff-good">ROI: ${fmt(intSaved/extra/12)}/mo saved</div>`:''}
    </div>
  </div>`;
}

function applySimPayment(id){
  const d=D.debts.find(x=>x.id===id);
  const newPay=parseFloat(document.getElementById('sim-pay')?.value)||0;
  if(!d||newPay<=0){toast('Invalid payment','err');return;}
  if(!confirm('Update '+d.name+' payment to '+fmt(newPay)+'/mo?'))return;
  d.payment=newPay;
  closeMo();onChange();toast('Payment updated ✓','ok');
}

// ─── ACTIONS ─────────────────────────────────────────────────
function takeSnapshot(){
  const {net}=calcNW();
  const ds=todayStr();
  const idx=D.history.findIndex(h=>h.date===ds);
  if(idx>=0)D.history[idx].value=net;
  else D.history.push({date:ds,value:net});
  onChange();toast('Snapshot saved ✓','ok');
}
function makePayment(id){
  const d=D.debts.find(x=>x.id===id);
  if(!d)return;
  const amt=parseFloat(prompt('Payment amount for '+d.name+'?\n(Current balance: '+fmt(d.balance)+')',d.payment));
  if(isNaN(amt)||amt<=0)return;
  d.balance=Math.max(0,(parseFloat(d.balance)||0)-amt);
  if(d.balance<0.01){if(confirm('Balance is now $0. Remove this debt?'))D.debts=D.debts.filter(x=>x.id!==id);}
  onChange();toast('Payment recorded ✓','ok');
}
function deleteDebt(id){if(!confirm('Delete this debt?'))return;D.debts=D.debts.filter(x=>x.id!==id);onChange();toast('Deleted');}
function deleteSavings(id){if(!confirm('Delete this account?'))return;D.savings=D.savings.filter(x=>x.id!==id);onChange();toast('Deleted');}
function deleteInv(id){if(!confirm('Delete this investment?'))return;D.investments=D.investments.filter(x=>x.id!==id);onChange();toast('Deleted');}
function deleteGoal(id){if(!confirm('Delete this goal?'))return;D.goals=D.goals.filter(x=>x.id!==id);onChange();toast('Deleted');}
function addToGoal(id){
  const g=D.goals.find(x=>x.id===id);if(!g)return;
  const amt=parseFloat(prompt('Add how much to "'+g.name+'"?\n(Currently: '+fmt(g.current)+')',g.monthly||''));
  if(isNaN(amt)||amt<=0)return;
  g.current=Math.min(g.target,(parseFloat(g.current)||0)+amt);
  onChange();toast('Progress updated ✓','ok');
}
function updateInvValue(id){
  const inv=D.investments.find(x=>x.id===id);if(!inv)return;
  const val=parseFloat(prompt('Current total value of '+inv.name+'?',inv.currentValue||''));
  if(isNaN(val)||val<0)return;
  inv.currentValue=val;
  onChange();toast('Value updated ✓','ok');
}

// ─── MODALS ──────────────────────────────────────────────────
function openMo(html){
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('overlay').classList.remove('hide');
  setTimeout(()=>{const inp=document.querySelector('#modal-body input:not([type=hidden])');if(inp)inp.focus();},100);
}
function closeMo(){document.getElementById('overlay').classList.add('hide');}
function closeModalOutside(e){if(e.target===document.getElementById('overlay'))closeMo();}

function openAdd(){
  if(activeTab==='debts')openAddDebt();
  else if(activeTab==='savings')openAddSavings();
  else if(activeTab==='investments')openAddInv();
  else if(activeTab==='goals')openAddGoal();
}

// Debt modal
function debtModal(d,isEdit){
  const id=d?d.id:uid();
  openMo(`
    <div class="modal-title">${isEdit?'Edit':'Add'} Debt</div>
    <div class="form-row"><div class="form-label">Name</div>
      <input class="form-input" id="f-name" value="${d?.name||''}" placeholder="e.g. Student Loan"/></div>
    <div class="form-row"><div class="form-label">Type</div>
      <select class="form-select" id="f-type">
        <option value="student_loan"${d?.type==='student_loan'?' selected':''}>Student Loan</option>
        <option value="credit_card"${d?.type==='credit_card'?' selected':''}>Credit Card</option>
        <option value="personal"${d?.type==='personal'?' selected':''}>Personal Loan</option>
        <option value="mortgage"${d?.type==='mortgage'?' selected':''}>Mortgage</option>
        <option value="auto"${d?.type==='auto'?' selected':''}>Auto Loan</option>
        <option value="other"${d?.type==='other'?' selected':''}>Other</option>
      </select></div>
    <div class="form-row-2">
      <div><div class="form-label">Balance Owed</div>
        <input class="form-input" id="f-bal" type="number" step="0.01" value="${d?.balance??''}" placeholder="0.00"/></div>
      <div><div class="form-label">Original Balance</div>
        <input class="form-input" id="f-origbal" type="number" step="0.01" value="${d?.originalBalance??d?.balance??''}" placeholder="0.00"/>
        <div class="form-hint" style="font-size:10px;color:var(--text3);margin-top:3px">What you started with</div></div>
    </div>
    <div class="form-row-2">
      <div><div class="form-label">Interest Rate %</div>
        <input class="form-input" id="f-rate" type="number" step="0.01" value="${d?.rate??''}" placeholder="e.g. 8.15"/></div>
      <div></div>
    </div>
    <div class="form-row-2">
      <div><div class="form-label">Monthly Payment</div>
        <input class="form-input" id="f-pay" type="number" step="0.01" value="${d?.payment??''}" placeholder="0.00"/></div>
      <div><div class="form-label">Due Day</div>
        <input class="form-input" id="f-due" type="number" min="1" max="31" value="${d?.dueDay||''}" placeholder="e.g. 15"/></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeMo()">Cancel</button>
      <button class="btn-save" onclick="saveDebt('${id}',${isEdit})">Save</button>
      ${isEdit?`<button class="btn-delete" onclick="deleteDebt('${id}');closeMo()">Delete Debt</button>`:''}
    </div>`);
}
function openAddDebt(){debtModal(null,false);}
function openEditDebt(id){debtModal(D.debts.find(d=>d.id===id),true);}
function saveDebt(id,isEdit){
  const name=document.getElementById('f-name').value.trim();
  if(!name){toast('Enter debt name','err');return;}
  const item={id,name,type:document.getElementById('f-type').value,
    balance:parseFloat(document.getElementById('f-bal').value)||0,
    originalBalance:parseFloat(document.getElementById('f-origbal').value)||parseFloat(document.getElementById('f-bal').value)||0,
    rate:parseFloat(document.getElementById('f-rate').value)||0,
    payment:parseFloat(document.getElementById('f-pay').value)||0,
    dueDay:parseInt(document.getElementById('f-due').value)||null};
  if(isEdit){
    const x=D.debts.find(d=>d.id===id);
    if(x){
      // Never let originalBalance go LOWER than the new balance when editing
      if(!item.originalBalance||item.originalBalance<item.balance) item.originalBalance=x.originalBalance||item.balance;
      Object.assign(x,item);
    }
  }
  else D.debts.push(item);
  closeMo();onChange();toast(isEdit?'Debt updated':'Debt added ✓','ok');
}
