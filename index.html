<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="manifest.json"/>
<title>Net Worth</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--bg4:#1e1e27;--border:#2a2a38;--border2:#333345;--text:#f0f0f5;--text2:#9090a8;--text3:#5a5a72;--green:#00e5a0;--green2:#00b880;--red:#ff4d6a;--red2:#cc2d47;--yellow:#f5c542;--blue:#4d90ff;--purple:#9b7ec8;--mono:'DM Mono',monospace;--sans:'Syne',sans-serif;--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px}
.hide{display:none!important}

/* AUTH */
#auth{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.auth-logo{font-family:var(--sans);font-size:36px;font-weight:800;letter-spacing:-2px;background:linear-gradient(135deg,var(--green),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.auth-sub{color:var(--text3);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:36px}
.auth-tabs{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px;width:100%;max-width:320px}
.auth-tab{flex:1;padding:10px;background:none;border:none;color:var(--text2);font-family:var(--mono);font-size:13px;cursor:pointer}
.auth-tab.active{background:var(--bg4);color:var(--text)}
.auth-form{width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px}
.auth-form.hide{display:none!important}
.auth-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;padding:12px 14px;outline:none}
.auth-input:focus{border-color:var(--purple)}
.auth-btn{width:100%;background:linear-gradient(135deg,var(--green2),var(--purple));border:none;border-radius:8px;color:#000;font-family:var(--sans);font-size:14px;font-weight:700;padding:13px;cursor:pointer;margin-top:4px}
.auth-msg{font-size:12px;min-height:18px;text-align:center;margin-top:4px;color:var(--text3)}
.auth-msg.err{color:var(--red)}
.auth-msg.ok{color:var(--green)}
.auth-link{color:var(--text3);font-size:12px;text-align:center;cursor:pointer;margin-top:8px}

/* APP */
#app{display:flex;flex-direction:column;height:100%;overflow:hidden}

/* HEADER */
.app-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-title{font-family:var(--sans);font-size:16px;font-weight:800;letter-spacing:2px;color:var(--green)}
.app-sub{font-size:11px;color:var(--text3);letter-spacing:1px}
.header-right{display:flex;align-items:center;gap:8px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.busy{background:var(--yellow);animation:pulse 1s infinite}
.sync-dot.err{background:var(--red)}
.icon-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:6px;border-radius:6px;font-size:16px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* NET WORTH BANNER */
.nw-banner{background:var(--bg3);border-bottom:1px solid var(--border);padding:16px;text-align:center;flex-shrink:0}
.nw-label{font-size:10px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.nw-value{font-family:var(--sans);font-size:36px;font-weight:800;letter-spacing:-1px}
.nw-value.pos{color:var(--green)}
.nw-value.neg{color:var(--red)}
.nw-meta{font-size:11px;color:var(--text3);margin-top:4px;display:flex;justify-content:center;gap:16px}
.nw-meta-item{display:flex;gap:4px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green)}
.dot-red{background:var(--red)}

/* TABS */
.nav-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.nav-tab{flex:1;padding:10px 4px;background:none;border:none;color:var(--text3);font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent}
.nav-tab.active{color:var(--green);border-bottom-color:var(--green)}

/* CONTENT */
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px}
#content::-webkit-scrollbar{width:3px}
#content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* FAB */
.fab{position:fixed;bottom:calc(20px + var(--safe-bottom));right:20px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--green2),var(--purple));border:none;color:#000;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,229,160,.3);z-index:40}

/* CARDS */
.section-label{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.section-total{font-family:var(--mono);font-size:13px;font-weight:500}
.section-total.pos{color:var(--green)}
.section-total.neg{color:var(--red)}

.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;margin:0 12px 8px;padding:14px 16px}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.card-name{font-size:14px;font-weight:500;color:var(--text)}
.card-badge{font-size:10px;padding:2px 8px;border-radius:20px;letter-spacing:1px;text-transform:uppercase}
.badge-checking,.badge-cash{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.25)}
.badge-savings{background:rgba(77,144,255,.1);color:var(--blue);border:1px solid rgba(77,144,255,.25)}
.badge-credit{background:rgba(255,77,106,.1);color:var(--red);border:1px solid rgba(255,77,106,.25)}
.badge-student_loan,.badge-personal,.badge-other{background:rgba(245,197,66,.1);color:var(--yellow);border:1px solid rgba(245,197,66,.25)}
.badge-credit_card{background:rgba(255,77,106,.1);color:var(--red);border:1px solid rgba(255,77,106,.25)}
.card-amount{font-family:var(--mono);font-size:22px;font-weight:500}
.card-amount.pos{color:var(--green)}
.card-amount.neg{color:var(--red)}
.card-meta{font-size:11px;color:var(--text3);margin-top:4px}
.card-actions{display:flex;border-top:1px solid var(--border);margin:10px -16px -14px;border-radius:0 0 12px 12px;overflow:hidden}
.card-btn{flex:1;background:none;border:none;color:var(--text3);padding:8px;font-size:12px;cursor:pointer;font-family:var(--mono)}
.card-btn:hover{background:var(--bg4);color:var(--text)}
.card-btn.danger:hover{color:var(--red)}

/* DEBT PROGRESS */
.debt-bar{height:4px;background:var(--bg4);border-radius:2px;margin-top:8px;overflow:hidden}
.debt-fill{height:100%;border-radius:2px;background:var(--red)}

/* GOAL PROGRESS */
.goal-bar{height:6px;background:var(--bg4);border-radius:3px;margin-top:8px;overflow:hidden}
.goal-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green2),var(--green))}
.goal-pct{font-family:var(--sans);font-size:18px;font-weight:700;color:var(--green)}

/* EMPTY */
.empty{text-align:center;padding:40px 24px;color:var(--text3);font-size:12px;letter-spacing:1px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px 18px 0 0;padding:20px 20px 32px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.modal-title{font-family:var(--sans);font-size:17px;font-weight:700;margin-bottom:18px;color:var(--text)}
.form-row{margin-bottom:12px}
.form-label{font-size:11px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.form-input{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;padding:11px 14px;outline:none}
.form-input:focus{border-color:var(--purple)}
.form-select{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;padding:11px 14px;outline:none;appearance:none;cursor:pointer}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.btn-cancel{background:var(--bg4);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:12px;font-family:var(--mono);font-size:13px;cursor:pointer}
.btn-save{background:linear-gradient(135deg,var(--green2),var(--purple));border:none;color:#000;border-radius:8px;padding:12px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer}
.btn-delete{background:var(--bg4);border:1px solid var(--red2);color:var(--red);border-radius:8px;padding:12px;font-family:var(--mono);font-size:13px;cursor:pointer;grid-column:1/-1}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);color:var(--text);font-size:13px;padding:10px 18px;border-radius:20px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.toast.ok{border-color:rgba(0,229,160,.4);color:var(--green)}
.toast.err{border-color:rgba(255,77,106,.4);color:var(--red)}

/* HISTORY */
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border)}
.hist-row:last-child{border-bottom:none}
.hist-date{font-size:12px;color:var(--text2)}
.hist-val{font-family:var(--mono);font-size:14px;font-weight:500}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth" class="hide">
  <div class="auth-logo">NET WORTH</div>
  <div class="auth-sub">loans · savings · goals</div>
  <div class="auth-tabs">
    <button class="auth-tab active" onclick="authTab('in')">Sign In</button>
    <button class="auth-tab" onclick="authTab('up')">Sign Up</button>
  </div>
  <div class="auth-form" id="form-in">
    <input class="auth-input" id="em-in" type="email" placeholder="email address" autocomplete="email"/>
    <input class="auth-input" id="pw-in" type="password" placeholder="password" autocomplete="current-password"/>
    <button class="auth-btn" onclick="doSignIn()">Sign In</button>
    <div class="auth-link" onclick="authTab('forgot')">Forgot password?</div>
  </div>
  <div class="auth-form hide" id="form-up">
    <input class="auth-input" id="em-up" type="email" placeholder="email address" autocomplete="email"/>
    <input class="auth-input" id="pw-up" type="password" placeholder="password (min 6 chars)" autocomplete="new-password"/>
    <button class="auth-btn" onclick="doSignUp()">Create Account</button>
  </div>
  <div class="auth-form hide" id="form-forgot">
    <div style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:10px">Enter your email to get a reset link.</div>
    <input class="auth-input" id="em-forgot" type="email" placeholder="email address"/>
    <button class="auth-btn" onclick="doForgot()">Send Reset Link</button>
    <div class="auth-link" onclick="authTab('in')">← Back to sign in</div>
  </div>
  <div class="auth-msg" id="auth-msg"></div>
</div>

<!-- APP -->
<div id="app" class="hide">
  <div class="app-header">
    <div>
      <div class="app-title">NET WORTH</div>
      <div class="app-sub">// loans &amp; investments</div>
    </div>
    <div class="header-right">
      <div class="sync-dot" id="sync-dot"></div>
      <button class="icon-btn" onclick="doSignOut()">⏻</button>
    </div>
  </div>

  <div class="nw-banner">
    <div class="nw-label">Total Net Worth</div>
    <div class="nw-value" id="nw-total">$0.00</div>
    <div class="nw-meta">
      <span class="nw-meta-item"><span class="dot dot-green"></span><span id="nw-assets">Assets $0</span></span>
      <span class="nw-meta-item"><span class="dot dot-red"></span><span id="nw-debts">Debts $0</span></span>
    </div>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="accounts" onclick="setTab('accounts')">Accounts</button>
    <button class="nav-tab" data-tab="debts" onclick="setTab('debts')">Debts</button>
    <button class="nav-tab" data-tab="goals" onclick="setTab('goals')">Goals</button>
    <button class="nav-tab" data-tab="history" onclick="setTab('history')">History</button>
  </div>

  <div id="content"></div>
  <button class="fab" id="fab" onclick="openAdd()">+</button>
</div>

<!-- MODAL -->
<div class="overlay hide" id="overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-body"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ─── SUPABASE ───────────────────────────────────────────────
const SB = supabase.createClient(
  'https://uvqjswdfcixwktgvnzbq.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2cWpzd2RmY2l4d2t0Z3ZuemJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDExMzEsImV4cCI6MjA4NzkxNzEzMX0.SMB9fnxmLHFNTNkJk47UFpMqlccv_wvJOYAicvGxqoI'
);

// ─── DATA ────────────────────────────────────────────────────
const LK = 'nw_data_v2';
let ME = null;
let D = {
  accounts: [],
  debts: [],
  goals: [],
  history: []
};
let saveT = null;
let activeTab = 'accounts';

// Pre-load recovered data if nothing exists yet
const RECOVERED = {"accounts":[{"id":"mmd195ntrvhd","name":"Capital One Checking","type":"checking","balance":321.34,"last4":"0171"},{"id":"mmd19zvgv1vw","name":"Capital One Savings","type":"savings","balance":520,"last4":"2413"},{"id":"mmd1b5lt9dtd","name":"Discover Savings","type":"savings","balance":10025.37,"last4":"3605"},{"id":"mmd1bpukanpg","name":"Discover Credit Card","type":"credit","balance":-4000,"last4":"2888"},{"id":"mmd1d0vk9jvr","name":"WellsFargo Savings","type":"savings","balance":264.51,"last4":"9234"},{"id":"mmd1dzgnhzcu","name":"SoFi Checking","type":"checking","balance":44.94,"last4":"0285"},{"id":"mmd1ejo149vt","name":"SoFi Savings","type":"savings","balance":185.02,"last4":"5572"},{"id":"mmd1gb7tgy8e","name":"Cash","type":"cash","balance":530,"last4":""}],"debts":[{"id":"d1","name":"SoFi Student Loan","balance":22500,"rate":8.15,"payment":25,"type":"student_loan","dueDay":19},{"id":"mmd10wlr394f","name":"Discover Credit Card","balance":4000,"rate":21.49,"payment":100,"type":"credit_card","dueDay":13},{"id":"mmd12wxhdo9l","name":"Avant Loans","balance":22898.77,"rate":30.4,"payment":689.51,"type":"personal","dueDay":13},{"id":"mmd15nv7j6yb","name":"Klarna","balance":138.1,"rate":0,"payment":13.81,"type":"other","dueDay":28}],"goals":[{"id":"g1","name":"Emergency Fund","target":4000,"current":120,"monthly":400,"date":"2026-12-31"},{"id":"g3","name":"New MacBook","target":2500,"current":0,"monthly":50,"date":""},{"id":"mmd3g6ng5n48","name":"Shipping to Family","target":1800,"current":400,"monthly":0,"date":"2026-10-31"},{"id":"mmd3hh7fr1j9","name":"Car","target":15000,"current":0,"monthly":0,"date":"2026-12-31"},{"id":"mme9k3e2af95","name":"REF 2026 Tuition","target":400,"current":0,"monthly":0,"date":"2026-08-31"},{"id":"mme9l6ebl7j7","name":"Mish's Tuition","target":700,"current":0,"monthly":0,"date":"2026-08-31"}],"history":[{"date":"2026-03-05","value":-41645.69}]};

// ─── UTILS ───────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function fmt(n) {
  const num = parseFloat(n) || 0;
  const abs = Math.abs(num);
  const str = abs.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  return (num < 0 ? '-' : '') + '$' + str;
}

// DATE FIX: parse YYYY-MM-DD as local time, not UTC
function parseLocalDate(dateStr) {
  if (!dateStr) return null;
  const parts = dateStr.split('-');
  if (parts.length !== 3) return new Date(dateStr);
  return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
}

function fmtDate(dateStr) {
  if (!dateStr) return '';
  const d = parseLocalDate(dateStr);
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function fmtDateShort(dateStr) {
  if (!dateStr) return '';
  const d = parseLocalDate(dateStr);
  return d.toLocaleDateString('en-US', {month:'short', year:'numeric'});
}

function monthsUntil(dateStr) {
  if (!dateStr) return null;
  const d = parseLocalDate(dateStr);
  const now = new Date();
  return Math.max(0, (d.getFullYear() - now.getFullYear()) * 12 + (d.getMonth() - now.getMonth()));
}

function payoffDate(balance, payment, rate) {
  if (payment <= 0) return 'No payment set';
  if (rate === 0) {
    const months = Math.ceil(balance / payment);
    const d = new Date();
    d.setMonth(d.getMonth() + months);
    // Use getFullYear and getMonth() + 1 to avoid off-by-one
    const yr = d.getFullYear();
    const mo = d.getMonth() + 1; // FIX: +1 here
    const moStr = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][mo-1];
    return moStr + ' ' + yr;
  }
  const r = rate / 100 / 12;
  let bal = balance;
  let months = 0;
  while (bal > 0 && months < 600) {
    bal = bal * (1 + r) - payment;
    months++;
  }
  if (months >= 600) return 'Payment too low';
  const d = new Date();
  d.setMonth(d.getMonth() + months);
  const yr = d.getFullYear();
  const mo = d.getMonth() + 1; // FIX: +1 here
  const moStr = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][mo-1];
  return moStr + ' ' + yr;
}

function calcNW() {
  const assets = D.accounts.reduce((s,a) => s + Math.max(0, parseFloat(a.balance)||0), 0);
  const liabilities = D.debts.reduce((s,d) => s + (parseFloat(d.balance)||0), 0);
  return {assets, liabilities, net: assets - liabilities};
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

// ─── SYNC ────────────────────────────────────────────────────
function setSyncUI(st) {
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-dot' + (st==='busy'?' busy':st==='err'?' err':'');
}

function saveLocal() {
  try { localStorage.setItem(LK, JSON.stringify(D)); } catch(e) {}
}

function loadLocal() {
  try {
    const s = localStorage.getItem(LK);
    if (s) {
      const p = JSON.parse(s);
      if (p && p.accounts) D = p;
    }
  } catch(e) {}
  if (!D.accounts) D.accounts = [];
  if (!D.debts) D.debts = [];
  if (!D.goals) D.goals = [];
  if (!D.history) D.history = [];

  // First time: load recovered data
  if (!D.accounts.length && !D.debts.length && !D.goals.length) {
    D = JSON.parse(JSON.stringify(RECOVERED));
  }
}

async function pushCloud() {
  if (!ME) return;
  setSyncUI('busy');
  clearTimeout(saveT);
  saveT = setTimeout(async function() {
    const {error} = await SB.from('user_data').upsert(
      {id: ME.id, networth_data: JSON.parse(JSON.stringify(D)), updated_at: new Date().toISOString()},
      {onConflict: 'id'}
    );
    setSyncUI(error ? 'err' : 'ok');
    if (error) toast('Sync failed', 'err');
  }, 1000);
}

async function pullCloud() {
  if (!ME) return;
  setSyncUI('busy');
  const {data, error} = await SB.from('user_data').select('networth_data').eq('id', ME.id).single();
  if (data && data.networth_data && data.networth_data.accounts) {
    D = data.networth_data;
    if (!D.history) D.history = [];
    saveLocal();
  } else if (!error || error.code === 'PGRST116') {
    // No cloud data yet — push local
    pushCloud();
  }
  setSyncUI('ok');
  renderAll();
}

function onChange() {
  saveLocal();
  pushCloud();
  renderAll();
}

// ─── AUTH ────────────────────────────────────────────────────
function authTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((b,i) =>
    b.classList.toggle('active', (i===0&&tab==='in')||(i===1&&tab==='up')));
  document.getElementById('form-in').classList.toggle('hide', tab!=='in');
  document.getElementById('form-up').classList.toggle('hide', tab!=='up');
  document.getElementById('form-forgot').classList.toggle('hide', tab!=='forgot');
  document.getElementById('auth-msg').textContent = '';
}
function setAuthMsg(msg, type) {
  const el = document.getElementById('auth-msg');
  el.textContent = msg;
  el.className = 'auth-msg' + (type?' '+type:'');
}
async function doSignIn() {
  const em = document.getElementById('em-in').value.trim();
  const pw = document.getElementById('pw-in').value;
  if (!em||!pw) { setAuthMsg('Enter email and password','err'); return; }
  setAuthMsg('Signing in...','');
  const {error} = await SB.auth.signInWithPassword({email:em, password:pw});
  if (error) setAuthMsg(error.message, 'err');
}
async function doSignUp() {
  const em = document.getElementById('em-up').value.trim();
  const pw = document.getElementById('pw-up').value;
  if (!em||!pw) { setAuthMsg('Enter email and password','err'); return; }
  if (pw.length < 6) { setAuthMsg('Password must be at least 6 characters','err'); return; }
  setAuthMsg('Creating account...','');
  const {error} = await SB.auth.signUp({email:em, password:pw});
  if (error) setAuthMsg(error.message, 'err');
  else setAuthMsg('✓ Check your email to confirm','ok');
}
async function doForgot() {
  const em = document.getElementById('em-forgot').value.trim();
  if (!em) { setAuthMsg('Enter your email','err'); return; }
  const {error} = await SB.auth.resetPasswordForEmail(em);
  if (error) setAuthMsg(error.message, 'err');
  else setAuthMsg('✓ Reset link sent!','ok');
}
async function doSignOut() {
  if (!confirm('Sign out?')) return;
  await SB.auth.signOut();
  ME = null;
  document.getElementById('auth').classList.remove('hide');
  document.getElementById('app').classList.add('hide');
}
function showApp() {
  document.getElementById('auth').classList.add('hide');
  document.getElementById('app').classList.remove('hide');
}
function showAuth() {
  document.getElementById('auth').classList.remove('hide');
  document.getElementById('app').classList.add('hide');
}

// ─── NAV ─────────────────────────────────────────────────────
function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
  document.getElementById('fab').classList.toggle('hide', tab==='history');
  renderAll();
}

// ─── RENDER ──────────────────────────────────────────────────
function renderAll() {
  const {assets, liabilities, net} = calcNW();
  const nwEl = document.getElementById('nw-total');
  nwEl.textContent = fmt(net);
  nwEl.className = 'nw-value ' + (net >= 0 ? 'pos' : 'neg');
  document.getElementById('nw-assets').textContent = 'Assets ' + fmt(assets);
  document.getElementById('nw-debts').textContent = 'Debts ' + fmt(liabilities);

  const content = document.getElementById('content');
  if (activeTab === 'accounts') content.innerHTML = renderAccounts();
  else if (activeTab === 'debts') content.innerHTML = renderDebts();
  else if (activeTab === 'goals') content.innerHTML = renderGoals();
  else if (activeTab === 'history') content.innerHTML = renderHistory();
}

function renderAccounts() {
  if (!D.accounts.length) return `<div class="empty">No accounts yet — tap + to add one</div>`;
  const byType = {checking:[], savings:[], credit:[], cash:[], other:[]};
  D.accounts.forEach(a => (byType[a.type] || byType.other).push(a));
  const typeLabel = {checking:'Checking', savings:'Savings', credit:'Credit Cards', cash:'Cash', other:'Other'};
  let html = '';
  Object.entries(byType).forEach(([type, accts]) => {
    if (!accts.length) return;
    const total = accts.reduce((s,a) => s+(parseFloat(a.balance)||0), 0);
    html += `<div class="section-label">${typeLabel[type]}<span class="section-total ${total>=0?'pos':'neg'}">${fmt(total)}</span></div>`;
    accts.forEach(a => {
      const bal = parseFloat(a.balance)||0;
      html += `<div class="card">
        <div class="card-top">
          <div class="card-name">${a.name}${a.last4?' ···'+a.last4:''}</div>
          <span class="card-badge badge-${a.type}">${a.type}</span>
        </div>
        <div class="card-amount ${bal>=0?'pos':'neg'}">${fmt(bal)}</div>
        <div class="card-actions">
          <button class="card-btn" onclick="openEditAccount('${a.id}')">✎ Edit</button>
          <button class="card-btn danger" onclick="deleteAccount('${a.id}')">✕ Delete</button>
        </div>
      </div>`;
    });
  });
  return html;
}

function renderDebts() {
  if (!D.debts.length) return `<div class="empty">No debts — great!</div>`;
  const total = D.debts.reduce((s,d) => s+(parseFloat(d.balance)||0), 0);
  let html = `<div class="section-label">All Debts<span class="section-total neg">${fmt(total)}</span></div>`;
  D.debts.sort((a,b) => (parseFloat(b.rate)||0)-(parseFloat(a.rate)||0)).forEach(d => {
    const bal = parseFloat(d.balance)||0;
    const payoff = payoffDate(bal, parseFloat(d.payment)||0, parseFloat(d.rate)||0);
    const monthlyInt = bal * (parseFloat(d.rate)||0) / 100 / 12;
    html += `<div class="card">
      <div class="card-top">
        <div class="card-name">${d.name}</div>
        <span class="card-badge badge-${d.type}">${(d.rate||0)+'%'}</span>
      </div>
      <div class="card-amount neg">${fmt(bal)}</div>
      <div class="card-meta">
        Payment: ${fmt(d.payment)}/mo${d.dueDay?' · due '+d.dueDay+'th':''}
        ${d.rate>0?' · $'+monthlyInt.toFixed(2)+'/mo interest':''}
        · Payoff: ${payoff}
      </div>
      <div class="card-actions">
        <button class="card-btn" onclick="openEditDebt('${d.id}')">✎ Edit</button>
        <button class="card-btn" onclick="makePayment('${d.id}')">💳 Payment</button>
        <button class="card-btn danger" onclick="deleteDebt('${d.id}')">✕</button>
      </div>
    </div>`;
  });
  return html;
}

function renderGoals() {
  let html = '';
  if (!D.goals.length) return `<div class="empty">No goals yet — tap + to add one</div>`;
  D.goals.forEach(g => {
    const pct = g.target > 0 ? Math.min(100, Math.round((g.current/g.target)*100)) : 0;
    const remaining = Math.max(0, g.target - g.current);
    const months = g.monthly > 0 ? Math.ceil(remaining / g.monthly) : null;
    html += `<div class="card">
      <div class="card-top">
        <div class="card-name">${g.name}</div>
        <div class="goal-pct">${pct}%</div>
      </div>
      <div class="card-meta" style="margin-bottom:4px">
        ${fmt(g.current)} saved of ${fmt(g.target)}
        ${g.date?' · Target: '+fmtDate(g.date):''}
        ${months!==null?' · ~'+months+'mo at '+fmt(g.monthly)+'/mo':''}
      </div>
      <div class="goal-bar"><div class="goal-fill" style="width:${pct}%"></div></div>
      <div class="card-actions">
        <button class="card-btn" onclick="addToGoal('${g.id}')">+ Add Funds</button>
        <button class="card-btn" onclick="openEditGoal('${g.id}')">✎ Edit</button>
        <button class="card-btn danger" onclick="deleteGoal('${g.id}')">✕</button>
      </div>
    </div>`;
  });
  return html;
}

function renderHistory() {
  if (!D.history.length) return `<div class="empty">No history yet — snapshots appear here</div>`;
  const sorted = [...D.history].sort((a,b) => b.date.localeCompare(a.date));
  let html = `<div style="padding:12px 16px 0;display:flex;justify-content:flex-end">
    <button onclick="takeSnapshot()" style="background:none;border:1px solid var(--border);color:var(--text3);padding:6px 12px;border-radius:20px;font-family:var(--mono);font-size:11px;cursor:pointer">📸 Snapshot Today</button>
  </div>
  <div class="card" style="margin-top:12px">`;
  sorted.forEach(h => {
    html += `<div class="hist-row">
      <span class="hist-date">${fmtDate(h.date)}</span>
      <span class="hist-val ${h.value>=0?'':''}' style="color:${h.value>=0?'var(--green)':'var(--red)'}">${fmt(h.value)}</span>
    </div>`;
  });
  html += `</div>`;
  return html;
}

// ─── ACTIONS ─────────────────────────────────────────────────
function deleteAccount(id) {
  if (!confirm('Delete this account?')) return;
  D.accounts = D.accounts.filter(a => a.id !== id);
  onChange(); toast('Account deleted');
}
function deleteDebt(id) {
  if (!confirm('Delete this debt?')) return;
  D.debts = D.debts.filter(d => d.id !== id);
  onChange(); toast('Debt deleted');
}
function deleteGoal(id) {
  if (!confirm('Delete this goal?')) return;
  D.goals = D.goals.filter(g => g.id !== id);
  onChange(); toast('Goal deleted');
}
function makePayment(id) {
  const debt = D.debts.find(d => d.id === id);
  if (!debt) return;
  const amt = parseFloat(prompt('Payment amount for '+debt.name+'?', debt.payment));
  if (isNaN(amt) || amt <= 0) return;
  debt.balance = Math.max(0, (parseFloat(debt.balance)||0) - amt);
  if (debt.balance === 0) {
    if (confirm('Balance is now $0! Remove this debt?')) {
      D.debts = D.debts.filter(d => d.id !== id);
    }
  }
  onChange(); toast('Payment recorded ✓', 'ok');
}
function addToGoal(id) {
  const goal = D.goals.find(g => g.id === id);
  if (!goal) return;
  const amt = parseFloat(prompt('Add how much to "'+goal.name+'"?', goal.monthly||''));
  if (isNaN(amt) || amt <= 0) return;
  goal.current = Math.min(goal.target, (parseFloat(goal.current)||0) + amt);
  onChange(); toast('Progress updated ✓', 'ok');
}
function takeSnapshot() {
  const {net} = calcNW();
  const today = new Date();
  // FIX: build date string using local time, not UTC
  const dateStr = today.getFullYear() + '-' +
    String(today.getMonth()+1).padStart(2,'0') + '-' +
    String(today.getDate()).padStart(2,'0');
  // Replace existing snapshot for today or add new
  const existing = D.history.findIndex(h => h.date === dateStr);
  if (existing >= 0) D.history[existing].value = net;
  else D.history.push({date: dateStr, value: net});
  onChange(); toast('Snapshot saved ✓', 'ok');
}

// ─── MODALS ──────────────────────────────────────────────────
function openMo(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('overlay').classList.remove('hide');
  setTimeout(() => {
    const inp = document.querySelector('#modal-body input:not([type=hidden])');
    if (inp) inp.focus();
  }, 100);
}
function closeMo() { document.getElementById('overlay').classList.add('hide'); }
function closeModalOutside(e) { if (e.target===document.getElementById('overlay')) closeMo(); }

function openAdd() {
  if (activeTab==='accounts') openAddAccount();
  else if (activeTab==='debts') openAddDebt();
  else if (activeTab==='goals') openAddGoal();
}

        <option value="other" ${a?.type==='other'?'selected':''}>Other</option>

    <div class="form-row-2">

function openAddAccount() { accountModal(null, false); }
function openEditAccount(id) { accountModal(D.accounts.find(a=>a.id===id), true); }

  const name = document.getElementById('f-name').value.trim();

function openAddDebt() { debtModal(null, false); }

loadLocal();

SB.auth.getSession().then(function(res) {
  var session = res.data && res.data.session;
  if (session) {
    ME = session.user;
    showApp();
    pullCloud();
  } else {
    showAuth();
  }
});

SB.auth.onAuthStateChange(function(event, session) {
  if (event === 'SIGNED_IN') {
    ME = session.user;
    showApp();
    pullCloud();

    ME = null;
    showAuth();
  }
